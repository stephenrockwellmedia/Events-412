<script>
  window.addEventListener('message', e => {
    if (e.data === 'play') document.body.classList.add('play');
  });
</script>
<style>
  body.play .white, body.play .sweep, body.play .gold { animation-play-state: running; }
</style>

<div class="stage" id="stage">

  <div class="sweep"></div>
  <div class="layer gold" id="gold"></div>
</div>
